<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematika Ustoz</title>
    <style>
        body { background: linear-gradient(135deg, #8b0000 0%, #ff4500 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px 0; }
        
        /* Rasm klassi o'zgarmadi */
        .ustoz-photo {
            position: absolute; top: 15px; left: 15px; width: 100px; height: 100px;
            border-radius: 50%; border: 4px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); object-fit: cover; z-index: 20;
        }

        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 30px; border-radius: 30px; width: 90%; max-width: 400px; color: white; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-btn { width: 100%; padding: 15px; margin: 10px 0; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; color: white; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <img src="https://picsum.photos/200" alt="Test rasm" class="ustoz-photo">

    <div class="glass-card">
        <h1>Sinov sahifasi</h1>
        <p>Agar bu rasm chiqsa, demak kod ishlayapti!</p>
    </div>

</body>
</html>
